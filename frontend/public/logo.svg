<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="48" fill="url(#bgGrad)"/>

  <!-- Wallet base -->
  <rect x="52" y="86" width="136" height="94" rx="14" fill="#F8FAFC"/>
  <rect x="52" y="86" width="136" height="30" rx="14" fill="#E2E8F0"/>

  <!-- Wallet fold shadow -->
  <path d="M52 100 h136 v10 h-136 z" fill="#CBD5E1" opacity="0.5"/>

  <!-- Coin / dollar circle -->
  <circle cx="150" cy="140" r="26" fill="url(#coinGrad)"/>
  <circle cx="150" cy="140" r="26" fill="none" stroke="#065F46" stroke-width="2" opacity="0.3"/>

  <!-- Dollar sign -->
  <text x="150" y="150" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">$</text>

  <!-- Rising bar chart accent -->
  <rect x="66" y="150" width="10" height="16" rx="2" fill="#38BDF8"/>
  <rect x="80" y="140" width="10" height="26" rx="2" fill="#38BDF8"/>
  <rect x="94" y="130" width="10" height="36" rx="2" fill="#38BDF8"/>

  <!-- Top accent line -->
  <rect x="52" y="86" width="136" height="6" rx="3" fill="#38BDF8"/>
</svg>
